<!DOCTYPE html>
<html>
<head>
    <title>Stock Dashboard</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">📈 Stock Dashboard</h2>


    <div class="card p-3 mb-3">
        <div class="row">
            <div class="col-md-6">
                <label>Company 1</label>
                <select id="company1" class="form-select"></select>
            </div>
            <div class="col-md-6">
                <label>Company 2 (Compare)</label>
                <select id="company2" class="form-select"></select>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card p-3 mb-3">
        <canvas id="chart"></canvas>
    </div>

    <!-- Gainers / Losers -->
    <div class="row">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Top Gainers</h5>
                <div id="gainers"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Top Losers</h5>
                <div id="losers"></div>
            </div>
        </div>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js"></script>

</body>
</html>
